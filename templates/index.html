<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Кот-оракул 🐱</title>

<style>
body {
    background:#0f0f14;
    color:#e6e6e6;
    font-family:sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
}

#chat {
    width:90%;
    max-width:600px;
    height:420px;
    overflow-y:auto;
    background:#0a0a0f;
    padding:10px;
    border-radius:10px;
}

.msg {
    margin:6px 0;
    white-space:pre-wrap;
}

.user { color:#7a5cff; }
.bot { color:#dcdcdc; }

#avatar {
    width:120px;
    border-radius:50%;
    margin:10px;
    transition: transform 0.2s;
}
</style>
</head>

<body>

<h2>🐱 Кот-оракул</h2>
<img id="avatar" src="/static/cat.png">

<div>
<input id="name" placeholder="Имя">
<input id="q" placeholder="Вопрос">
<button onclick="ask()">Спросить</button>
</div>

<div id="chat"></div>

<script>
const chat = document.getElementById("chat");

function add(text, cls="bot"){
    const d = document.createElement("div");
    d.className = "msg " + cls;
    d.textContent = text;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
}

async function ask(){

    const name = document.getElementById("name").value || "человек";
    const q = document.getElementById("q").value;

    if (!q.trim()) return;

    add("Ты: " + q, "user");

    // 😼 смена аватара
    const moodRes = await fetch("/mood", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({name})
    });

    const moodData = await moodRes.json();

    const img = document.getElementById("avatar");
    if (moodData.avatar){
        img.src = moodData.avatar;
        img.style.transform = "scale(1.1)";
        setTimeout(()=> img.style.transform = "scale(1)", 200);
    }

    // 🧠 ответ КОТА (ТЕПЕРЬ JSON, НЕ STREAM)
    const res = await fetch("/ask", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({name, question:q})
    });

    const data = await res.json();

    add("Кот: " + data.answer, "bot");

    document.getElementById("q").value = "";
}
</script>

</body>
</html>
