<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кот-оракул 🐱</title>

<style>
body {
    margin: 0;
    background: #0f0f14;
    color: #e6e6e6;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    height: 100vh;
}

.app {
    width: 100%;
    max-width: 500px;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

header {
    text-align: center;
    padding: 10px;
}

#avatar {
    width: 90px;
    border-radius: 50%;
    margin: 5px auto;
    display: block;
    transition: transform 0.2s;
}

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    background: #0a0a0f;
}

.msg {
    margin: 6px 0;
    white-space: pre-wrap;
    padding: 8px;
    border-radius: 10px;
    max-width: 85%;
}

.user {
    background: #4a90e2;
    color: white;
    margin-left: auto;
}

.bot {
    background: #222;
    color: #ddd;
    margin-right: auto;
}

.input-bar {
    display: flex;
    padding: 10px;
    background: #111;
    gap: 8px;
}

input {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    outline: none;
}

button {
    padding: 12px 16px;
    border: none;
    border-radius: 10px;
    background: #4a90e2;
    color: white;
}
</style>
</head>

<body>

<div class="app">

<header>
    <h2>🐱 Кот-оракул</h2>
</header>

<img id="avatar" src="/static/cat.png">

<div id="chat"></div>

<div class="input-bar">
    <input id="name" placeholder="Имя">
    <input id="q" placeholder="Спроси кота...">
    <button onclick="ask()">➤</button>
</div>

</div>

<script>
const chat = document.getElementById("chat");

/* 🐱 ПРИВЕТСТВИЕ КОТА */
window.onload = () => {
    add("🐱 Кот: мяу… я проснулся.", "bot");

    setTimeout(() => {
        add("🐱 Кот: как тебя зовут, двуногое?", "bot");
    }, 800);

    setTimeout(() => {
        add("🐱 Кот: скажи имя и задай вопрос.", "bot");
    }, 1600);
};

function add(text, cls="bot"){
    const d = document.createElement("div");
    d.className = "msg " + cls;
    d.textContent = text;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
}

async function ask(){

    const name = document.getElementById("name").value || "человек";
    const q = document.getElementById("q").value;

    if (!q.trim()) return;

    add("Ты: " + q, "user");

    // 😼 смена аватара
    const moodRes = await fetch("/mood", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({name})
    });

    const moodData = await moodRes.json();

    const img = document.getElementById("avatar");
    if (moodData.avatar){
        img.src = moodData.avatar;
        img.style.transform = "scale(1.1)";
        setTimeout(()=> img.style.transform = "scale(1)", 200);
    }

    // 🧠 ответ КОТА
    const res = await fetch("/ask", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({name, question:q})
    });

    const data = await res.json();

    add("Кот: " + data.answer, "bot");

    document.getElementById("q").value = "";
}
</script>

</body>
</html>
